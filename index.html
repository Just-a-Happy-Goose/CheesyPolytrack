<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preload" href="forced_square.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="images/logo.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="images/discord.svg" as="image" type="image/svg+xml" />
    <link rel="manifest" href="manifest.json" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no" />
    <title>PolyTrack</title>
    <style>
      hr.official-separator {
        border: none;
        border-top: 2px solid rgba(255, 255, 255, 0.18);
        margin: 14px 8px 10px;
        border-radius: 2px;
      }
    </style>
    <script>
      window.electron = {
        quit: function () {
          try { window.close(); } catch (e) {}
        },
        addFullscreenChangeListener: function (fn) {
          document.addEventListener("fullscreenchange", fn);
          document.addEventListener("webkitfullscreenchange", fn);
        },
        isFullscreen: function () {
          return !!(document.fullscreenElement || document.webkitFullscreenElement);
        },
        setFullscreen: function (value) {
          if (value) {
            var el = document.documentElement;
            var req = el.requestFullscreen || el.webkitRequestFullscreen;
            if (req) req.call(el).catch(function () {});
          } else {
            var exit = document.exitFullscreen || document.webkitExitFullscreen;
            if (exit && (document.fullscreenElement || document.webkitFullscreenElement)) {
              exit.call(document).catch(function () {});
            }
          }
        }
      };
    </script>
    <script defer="defer" src="error_screen.bundle.js"></script>
    <script defer="defer" src="main.bundle.js"></script>
  </head>
  <body>
    <canvas id="screen"></canvas>
    <div id="ui"></div>
    <div id="transition-layer"></div>
  </body>
</html>
